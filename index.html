<!DOCTYPE html>
<html>
<head>
<title>Big-T Arcade</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
text-align:center;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
font-size:20px;
margin:10px;
padding:10px 20px;
cursor:pointer;
}

#player{
width:40px;
height:40px;
background:lime;
position:absolute;
bottom:40px;
left:50%;
display:none;
}

.enemy{
width:30px;
height:30px;
background:red;
position:absolute;
top:0;
}

#score{
position:absolute;
top:20px;
left:20px;
font-size:22px;
display:none;
}

/* hamburger menu */

#hamburger{
position:absolute;
top:15px;
right:20px;
font-size:30px;
cursor:pointer;
}

#sideMenu{
position:absolute;
top:0;
right:-200px;
width:200px;
height:100%;
background:#111;
padding-top:60px;
transition:0.3s;
}

.menuItem{
padding:15px;
border-bottom:1px solid #333;
cursor:pointer;
}

.menuItem:hover{
background:#333;
}

</style>
</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="sideMenu">
<div class="menuItem" onclick="startFortnight()">Fortnight</div>
</div>

<div id="menu">
<h1>Select Difficulty</h1>
<button onclick="startGame('easy')">Easy</button>
<button onclick="startGame('medium')">Medium</button>
<button onclick="startGame('hard')">Hard</button>
</div>

<div id="score">Score: 0</div>
<div id="player"></div>

<script>

let player=document.getElementById("player")
let scoreText=document.getElementById("score")

let playerX=window.innerWidth/2
let score=0
let speed=6
let spawnRate=800
let difficultyIncrease=10
let gameRunning=false

function toggleMenu(){

let menu=document.getElementById("sideMenu")

if(menu.style.right==="0px"){
menu.style.right="-200px"
}else{
menu.style.right="0px"
}

}

function startGame(level){

document.getElementById("menu").style.display="none"
player.style.display="block"
scoreText.style.display="block"

gameRunning=true

if(level==="easy"){
spawnRate=800
difficultyIncrease=10
}

if(level==="medium"){
spawnRate=500
difficultyIncrease=7
}

if(level==="hard"){
spawnRate=250
difficultyIncrease=5
}

setInterval(spawnEnemy,spawnRate)

}

function moveLeft(){

playerX -= 35

if(playerX < 0){
playerX = 0
}

player.style.left = playerX + "px"

}

function moveRight(){

playerX += 35

if(playerX > window.innerWidth - 40){
playerX = window.innerWidth - 40
}

player.style.left = playerX + "px"

}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") moveLeft()
if(e.key==="ArrowRight") moveRight()
})

document.addEventListener("touchstart",(e)=>{

let x=e.touches[0].clientX

if(x<window.innerWidth/2){
moveLeft()
}else{
moveRight()
}

})

function spawnEnemy(){

if(!gameRunning) return

let enemy=document.createElement("div")
enemy.classList.add("enemy")

enemy.style.left=Math.random()*(window.innerWidth-30)+"px"

document.body.appendChild(enemy)

let y=0

let fall=setInterval(()=>{

y+=speed
enemy.style.top=y+"px"

let playerRect=player.getBoundingClientRect()
let enemyRect=enemy.getBoundingClientRect()

if(
enemyRect.bottom>playerRect.top &&
enemyRect.top<playerRect.bottom &&
enemyRect.left<playerRect.right &&
enemyRect.right>playerRect.left
){
alert("Game Over! Score: "+score)
location.reload()
}

if(y>window.innerHeight){
enemy.remove()
score++
scoreText.innerText="Score: "+score

if(score%difficultyIncrease===0){
speed+=2
}

clearInterval(fall)
}

},30)

}

/* Fortnite-style game placeholder */

function startFortnight(){

alert("Fortnight 3D mode coming soon!")

}

</script>

</body>
</html>
