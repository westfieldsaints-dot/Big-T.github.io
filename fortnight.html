<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* MENU */
#menuBtn {
  position:absolute;
  top:10px;
  left:10px;
  font-size:28px;
  color:white;
  cursor:pointer;
  z-index:10;
}
#menu {
  position:absolute;
  top:0;
  left:-300px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.85);
  color:white;
  padding:20px;
  transition:0.3s;
}

/* CROSSHAIR */
#crosshair {
  position:absolute;
  top:50%;
  left:50%;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

/* BARS */
#bars {
  position:absolute;
  bottom:20px;
  left:20px;
  width:200px;
}
.barContainer {
  width:100%;
  height:18px;
  background:#333;
  margin-bottom:6px;
}
#healthBar { height:100%; width:100%; background:red; }
#staminaBar { height:100%; width:100%; background:lime; }

#ammo {
  position:absolute;
  bottom:20px;
  right:20px;
  color:white;
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="menu">
  <h2>Menu</h2>
  <a href="index.html" style="color:lime;">Other Game</a><br><br>
  WASD = Move<br>
  SHIFT = Sprint<br>
  SPACE = Jump<br>
  R = Reload<br>
  Click = Shoot
</div>

<div id="crosshair"></div>

<div id="bars">
  <div class="barContainer"><div id="healthBar"></div></div>
  <div class="barContainer"><div id="staminaBar"></div></div>
</div>

<div id="ammo"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// MENU
let menuOpen=false, paused=false;
menuBtn.onclick=()=>{
  menuOpen=!menuOpen;
  menu.style.left = menuOpen ? "0px":"-300px";
  paused=menuOpen;
  if(paused) document.exitPointerLock();
};

// SCENE
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

// CAMERA
let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDER
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(50,100,50);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff,0.5));

// ✅ FIXED GROUND (ONLY CHANGE)
let geo=new THREE.PlaneGeometry(600,600,30,30);
let pos=geo.attributes.position;
for(let i=0;i<pos.count;i++){
  pos.setY(i, Math.random()*0.3);
}
geo.computeVertexNormals();

let ground=new THREE.Mesh(
  geo,
  new THREE.MeshStandardMaterial({
    color:0x2e8b57,
    side:THREE.DoubleSide // FIX
  })
);
ground.rotation.x=-Math.PI/2;
ground.frustumCulled = false; // FIX
scene.add(ground);

// PLAYER
let player=new THREE.Object3D();
scene.add(player);
player.position.set(0,2,10);
player.add(camera);

// GUN
let gun=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.2,1),
  new THREE.MeshStandardMaterial({color:0x333333})
);
gun.position.set(0.4,-0.3,-1);
camera.add(gun);

// INPUT
let keys={};
document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()=="r") ammo=10;
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// POINTER LOCK
document.body.onclick=()=>{
  if(!menuOpen) document.body.requestPointerLock();
};

// LOOK
document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement===document.body && !paused){
    player.rotation.y-=e.movementX*0.002;
    camera.rotation.x-=e.movementY*0.002;
    camera.rotation.x=Math.max(-1.5,Math.min(1.5,camera.rotation.x));
  }
});

// STATS
let velocityY=0,onGround=true;
let stamina=100;
let health=100;
let ammo=10;

// MOVE
function move(){
  let running=keys["shift"] && stamina>0;
  let speed=running?0.18:0.1;

  if(running) stamina-=0.5;
  else stamina=Math.min(100, stamina+0.3);

  let forward=new THREE.Vector3();
  player.getWorldDirection(forward);
  forward.y=0;

  let right=new THREE.Vector3();
  right.crossVectors(forward,new THREE.Vector3(0,1,0));

  if(keys["w"]) player.position.addScaledVector(forward,speed);
  if(keys["s"]) player.position.addScaledVector(forward,-speed);
  if(keys["a"]) player.position.addScaledVector(right,speed);
  if(keys["d"]) player.position.addScaledVector(right,-speed);

  if(keys[" "] && onGround){
    velocityY=0.2;
    onGround=false;
  }

  velocityY-=0.01;
  player.position.y+=velocityY;

  if(player.position.y<=2){
    player.position.y=2;
    velocityY=0;
    onGround=true;
  }
}

// SHOOT
let bullets=[];
let enemies=[];

document.addEventListener("click",()=>{
  if(paused || ammo<=0) return;
  ammo--;

  let b=new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );

  b.position.copy(camera.getWorldPosition(new THREE.Vector3()));

  let dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  b.velocity=dir.multiplyScalar(1);

  scene.add(b);
  bullets.push(b);
});

// ENEMIES
function spawnEnemy(){
  let e=new THREE.Mesh(
    new THREE.CapsuleGeometry(0.5,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  e.position.set(Math.random()*100-50,2,Math.random()*-100);
  scene.add(e);
  enemies.push(e);
}
for(let i=0;i<8;i++) spawnEnemy();

// TREES
function tree(x,z){
  let t=new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,4),
    new THREE.MeshStandardMaterial({color:0x8b5a2b})
  );
  t.position.set(x,2,z);

  let l=new THREE.Mesh(
    new THREE.SphereGeometry(2),
    new THREE.MeshStandardMaterial({color:0x228b22})
  );
  l.position.set(x,5,z);

  scene.add(t,l);
}

// BUSH
function bush(x,z){
  let b=new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  b.position.set(x,1.5,z);
  scene.add(b);
}

// HOUSE
function house(x,z){
  let base=new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x8b5a2b})
  );
  base.position.set(x,2,z);

  let roof=new THREE.Mesh(
    new THREE.ConeGeometry(5,3,4),
    new THREE.MeshStandardMaterial({color:0xaa0000})
  );
  roof.position.set(x,5,z);
  roof.rotation.y=Math.PI/4;

  scene.add(base,roof);
}

// SPAWN
for(let i=0;i<15;i++) tree(Math.random()*200-100,Math.random()*-200);
for(let i=0;i<10;i++) bush(Math.random()*200-100,Math.random()*-200);
for(let i=0;i<8;i++) house(Math.random()*200-100,Math.random()*-200);

// LOOP
function animate(){
  requestAnimationFrame(animate);

  if(!paused){
    move();

    bullets.forEach((b,i)=>{
      b.position.add(b.velocity);

      enemies.forEach((e,ei)=>{
        if(b.position.distanceTo(e.position)<1){
          scene.remove(e);
          enemies.splice(ei,1);
        }
      });
    });

    healthBar.style.width = health+"%";
    staminaBar.style.width = stamina+"%";
    ammo.innerText = "Ammo: "+ammo;
  }

  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
