<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body{margin:0;overflow:hidden;cursor:none;}

#crosshair{
position:absolute;top:50%;left:50%;
width:12px;height:12px;background:white;
border-radius:50%;margin-left:-6px;margin-top:-6px;
}

#healthBox{
position:absolute;bottom:20px;left:20px;
width:200px;height:20px;background:#333;
}

#health{height:100%;width:100%;background:red;}

#score{
position:absolute;top:10px;right:20px;
color:white;font-family:Arial;font-size:20px;
}

#gameOver{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
color:white;font-size:40px;
display:none;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="healthBox"><div id="health"></div></div>
<div id="score">Score: 0</div>
<div id="gameOver">GAME OVER (Refresh)</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()
scene.background=new THREE.Color(0x87CEEB)

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000)
let renderer=new THREE.WebGLRenderer()
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

scene.add(new THREE.DirectionalLight(0xffffff,1))
scene.add(new THREE.AmbientLight(0xffffff,0.5))

let ground=new THREE.Mesh(
new THREE.PlaneGeometry(1500,1500),
new THREE.MeshLambertMaterial({color:0x2e8b57})
)
ground.rotation.x=-Math.PI/2
scene.add(ground)

let player=new THREE.Object3D()
let pitch=new THREE.Object3D()
pitch.add(camera)
player.add(pitch)
scene.add(player)

player.position.set(0,2,10)

let velocityY=0, gravity=-0.01, canJump=true, running=false

let health=100, score=0

function updateUI(){
document.getElementById("health").style.width=health+"%"
document.getElementById("score").innerText="Score: "+score
}

let colliders=[]

function addCollider(mesh){
colliders.push(new THREE.Box3().setFromObject(mesh))
}

function createHouse(x,z){
let house=new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshLambertMaterial({color:0x8B4513})
)
house.position.set(x,2.5,z)
scene.add(house)
addCollider(house)
}

for(let i=0;i<10;i++){
createHouse(Math.random()*200-100,Math.random()*-200)
}

let enemies=[], bullets=[], enemyBullets=[]

function spawnEnemy(){
if(enemies.length>15) return

let e=new THREE.Mesh(
new THREE.CapsuleGeometry(0.8,2),
new THREE.MeshLambertMaterial({color:0xff0000})
)

e.position.set(Math.random()*80-40,1,Math.random()*-120)
e.cooldown=100

scene.add(e)
enemies.push(e)
}

setInterval(spawnEnemy,3000)

document.addEventListener("click",()=>{

document.body.requestPointerLock()

if(bullets.length>50) return

let b=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffff00})
)

let dir=new THREE.Vector3()
camera.getWorldDirection(dir)

let spawn=new THREE.Vector3(0.4,-0.4,-1)
spawn.applyMatrix4(camera.matrixWorld)

b.position.copy(spawn)
b.velocity=dir.clone()
b.life=120

scene.add(b)
bullets.push(b)

})

let keys={}

document.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.code==="ShiftLeft") running=true
if(e.code==="Space" && canJump){velocityY=0.25;canJump=false}
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
if(e.code==="ShiftLeft") running=false
})

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){
player.rotation.y-=e.movementX*0.002
pitch.rotation.x-=e.movementY*0.002
pitch.rotation.x=Math.max(-1.5,Math.min(1.5,pitch.rotation.x))
}
})

function checkCollision(pos){
for(let box of colliders){
if(box.containsPoint(pos)) return true
}
return false
}

function animate(){
requestAnimationFrame(animate)

if(health<=0){
document.getElementById("gameOver").style.display="block"
return
}

let speed=running?0.45:0.2

let nextPos=player.position.clone()

if(keys["w"]) nextPos.z-=speed
if(keys["s"]) nextPos.z+=speed
if(keys["a"]) nextPos.x-=speed
if(keys["d"]) nextPos.x+=speed

if(!checkCollision(nextPos)) player.position.copy(nextPos)

velocityY+=gravity
player.position.y+=velocityY

if(player.position.y<=2){
player.position.y=2
velocityY=0
canJump=true
}

bullets.forEach((b,i)=>{
b.position.add(b.velocity.clone().multiplyScalar(1))
b.life--

if(b.life<=0){
scene.remove(b)
bullets.splice(i,1)
return
}

enemies.forEach((e,j)=>{
if(b.position.distanceTo(e.position)<1.5){
scene.remove(e)
enemies.splice(j,1)
scene.remove(b)
bullets.splice(i,1)
score++
updateUI()
}
})
})

enemies.forEach(e=>{
let dir=new THREE.Vector3().subVectors(player.position,e.position).normalize()
e.position.add(dir.multiplyScalar(0.03))

e.cooldown--
if(e.cooldown<=0){

if(enemyBullets.length>30) return

let b=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xff0000})
)

b.position.copy(e.position)
b.velocity=dir.clone()
b.life=150

scene.add(b)
enemyBullets.push(b)

e.cooldown=100
}
})

enemyBullets.forEach((b,i)=>{
b.position.add(b.velocity.clone().multiplyScalar(0.6))
b.life--

if(b.life<=0){
scene.remove(b)
enemyBullets.splice(i,1)
return
}

if(b.position.distanceTo(player.position)<1.5){
health=Math.max(0,health-10)
updateUI()
scene.remove(b)
enemyBullets.splice(i,1)
}
})

renderer.render(scene,camera)
}

animate()
updateUI()

</script>
</body>
</html>
