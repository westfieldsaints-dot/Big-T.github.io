<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:20px;
height:20px;
margin-left:-10px;
margin-top:-10px;
border:2px solid white;
border-radius:50%;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>

</head>

<body>

<div id="crosshair"></div>
<div id="info">Click screen • WASD move • Click shoot</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

let floorGeometry = new THREE.PlaneGeometry(200,200)
let floorMaterial = new THREE.MeshBasicMaterial({color:0x333333})

let floor = new THREE.Mesh(floorGeometry,floorMaterial)
floor.rotation.x = -Math.PI/2
scene.add(floor)

let controls = new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>{
controls.lock()
})

scene.add(controls.getObject())

camera.position.y = 2

let moveForward=false
let moveBackward=false
let moveLeft=false
let moveRight=false

document.addEventListener("keydown",(e)=>{

if(e.key==="w") moveForward=true
if(e.key==="s") moveBackward=true
if(e.key==="a") moveLeft=true
if(e.key==="d") moveRight=true

})

document.addEventListener("keyup",(e)=>{

if(e.key==="w") moveForward=false
if(e.key==="s") moveBackward=false
if(e.key==="a") moveLeft=false
if(e.key==="d") moveRight=false

})

let loader = new THREE.GLTFLoader()

let enemies=[]

function spawnEnemy(){

loader.load(
"https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",

function(gltf){

let enemy = gltf.scene

enemy.scale.set(1,1,1)

enemy.position.set(
Math.random()*40-20,
0,
Math.random()*-40
)

scene.add(enemy)

enemies.push(enemy)

})

}

setInterval(spawnEnemy,4000)

let bullets=[]

document.addEventListener("mousedown",()=>{

let geo=new THREE.SphereGeometry(0.2)
let mat=new THREE.MeshBasicMaterial({color:0xffff00})

let bullet=new THREE.Mesh(geo,mat)

bullet.position.copy(camera.position)

bullet.velocity=new THREE.Vector3()
camera.getWorldDirection(bullet.velocity)

scene.add(bullet)

bullets.push(bullet)

})

function animate(){

requestAnimationFrame(animate)

let speed=0.15

if(moveForward) controls.moveForward(speed)
if(moveBackward) controls.moveForward(-speed)
if(moveLeft) controls.moveRight(-speed)
if(moveRight) controls.moveRight(speed)

bullets.forEach(b=>{

b.position.add(b.velocity.clone().multiplyScalar(0.6))

enemies.forEach((enemy,index)=>{

if(b.position.distanceTo(enemy.position)<2){

scene.remove(enemy)
enemies.splice(index,1)

}

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
