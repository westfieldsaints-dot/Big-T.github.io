<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:10px;
height:10px;
background:white;
border-radius:50%;
}
</style>

</head>

<body>

<div id="info">WASD move • Mouse look • Click shoot</div>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x87CEEB)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.y = 2
camera.position.z = 10

let sun = new THREE.DirectionalLight(0xffffff,1)
sun.position.set(50,100,50)
scene.add(sun)

let ambient = new THREE.AmbientLight(0xffffff,0.4)
scene.add(ambient)

let groundGeo = new THREE.PlaneGeometry(500,500)
let groundMat = new THREE.MeshLambertMaterial({color:0x228B22})

let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x = -Math.PI/2
scene.add(ground)

function createHouse(x,z){

let base = new THREE.Mesh(
new THREE.BoxGeometry(6,4,6),
new THREE.MeshLambertMaterial({color:0x8B4513})
)

base.position.set(x,2,z)
scene.add(base)

let roof = new THREE.Mesh(
new THREE.ConeGeometry(5,3,4),
new THREE.MeshLambertMaterial({color:0xaa0000})
)

roof.position.set(x,5,z)
roof.rotation.y=Math.PI/4
scene.add(roof)

}

for(let i=0;i<8;i++){
createHouse(Math.random()*100-50,Math.random()*-100)
}

let enemies=[]

function spawnEnemy(){

let enemy=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshLambertMaterial({color:0xff0000})
)

enemy.position.set(
Math.random()*40-20,
1,
Math.random()*-60
)

scene.add(enemy)
enemies.push(enemy)

}

setInterval(spawnEnemy,3000)

let bullets=[]

document.addEventListener("click",()=>{

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffff00})
)

bullet.position.copy(camera.position)

bullet.velocity=new THREE.Vector3(0,0,-1)

scene.add(bullet)
bullets.push(bullet)

})

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function animate(){

requestAnimationFrame(animate)

let speed=0.2

if(keys["w"]) camera.position.z-=speed
if(keys["s"]) camera.position.z+=speed
if(keys["a"]) camera.position.x-=speed
if(keys["d"]) camera.position.x+=speed

bullets.forEach(b=>{

b.position.z-=0.8

enemies.forEach((enemy,i)=>{

if(b.position.distanceTo(enemy.position)<1.5){

scene.remove(enemy)
enemies.splice(i,1)

}

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
