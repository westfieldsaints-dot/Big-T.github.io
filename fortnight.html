<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body{
margin:0;
overflow:hidden;
cursor:none;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:12px;
height:12px;
background:white;
border-radius:50%;
margin-left:-6px;
margin-top:-6px;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>

</head>

<body>

<div id="crosshair"></div>
<div id="info">Click screen • WASD move • SHIFT run • Mouse look • Click shoot</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x87CEEB)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let sun = new THREE.DirectionalLight(0xffffff,1)
sun.position.set(50,100,50)
scene.add(sun)

let ambient = new THREE.AmbientLight(0xffffff,0.4)
scene.add(ambient)

let groundGeo = new THREE.PlaneGeometry(500,500)
let groundMat = new THREE.MeshLambertMaterial({color:0x228B22})

let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x = -Math.PI/2
scene.add(ground)

let player = new THREE.Object3D()
let pitchObject = new THREE.Object3D()

pitchObject.add(camera)
player.add(pitchObject)

scene.add(player)

player.position.set(0,2,10)

function createHouse(x,z){

let base = new THREE.Mesh(
new THREE.BoxGeometry(6,4,6),
new THREE.MeshLambertMaterial({color:0x8B4513})
)

base.position.set(x,2,z)
scene.add(base)

let roof = new THREE.Mesh(
new THREE.ConeGeometry(5,3,4),
new THREE.MeshLambertMaterial({color:0xaa0000})
)

roof.position.set(x,5,z)
roof.rotation.y=Math.PI/4
scene.add(roof)

}

for(let i=0;i<10;i++){
createHouse(Math.random()*120-60,Math.random()*-120)
}

let enemies=[]

function spawnEnemy(){

let enemy=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshLambertMaterial({color:0xff0000})
)

enemy.position.set(
Math.random()*40-20,
1,
Math.random()*-60
)

scene.add(enemy)
enemies.push(enemy)

}

setInterval(spawnEnemy,3000)

let bullets=[]

document.addEventListener("click",()=>{

document.body.requestPointerLock()

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffff00})
)

// direction camera is looking
let dir = new THREE.Vector3()
camera.getWorldDirection(dir)

// spawn bullet slightly in front of camera (like from hands)
bullet.position.copy(camera.position)
bullet.position.add(dir.clone().multiplyScalar(1))
bullet.position.y -= 0.3

bullet.velocity = dir.clone()

scene.add(bullet)
bullets.push(bullet)

})

let keys={}
let running=false

document.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.key==="Shift") running=true
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
if(e.key==="Shift") running=false
})

document.addEventListener("mousemove",(event)=>{

if(document.pointerLockElement===document.body){

player.rotation.y -= event.movementX * 0.002

pitchObject.rotation.x -= event.movementY * 0.002

let maxLook = Math.PI/2 - 0.1
pitchObject.rotation.x = Math.max(-maxLook, Math.min(maxLook, pitchObject.rotation.x))

}

})

function animate(){

requestAnimationFrame(animate)

let speed = running ? 0.45 : 0.2

if(keys["w"]) player.translateZ(-speed)
if(keys["s"]) player.translateZ(speed)
if(keys["a"]) player.translateX(-speed)
if(keys["d"]) player.translateX(speed)

player.position.y = 2

bullets.forEach(b=>{

b.position.add(b.velocity.clone().multiplyScalar(0.8))

if(b.position.y < 0) return

enemies.forEach((enemy,i)=>{

if(b.position.distanceTo(enemy.position)<1.5){

scene.remove(enemy)
enemies.splice(i,1)

}

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
