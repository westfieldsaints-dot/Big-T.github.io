<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>

body{
margin:0;
overflow:hidden;
cursor:none;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:12px;
height:12px;
background:white;
border-radius:50%;
margin-left:-6px;
margin-top:-6px;
}

#healthBox{
position:absolute;
bottom:20px;
left:20px;
width:200px;
height:20px;
background:#333;
}

#health{
height:100%;
width:100%;
background:red;
}

#score{
position:absolute;
top:10px;
right:20px;
color:white;
font-family:Arial;
font-size:20px;
}

</style>
</head>

<body>

<div id="crosshair"></div>

<div id="healthBox">
<div id="health"></div>
</div>

<div id="score">Score: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()
scene.background=new THREE.Color(0x87CEEB)

let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000)

let renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let sun=new THREE.DirectionalLight(0xffffff,1)
sun.position.set(50,100,50)
scene.add(sun)

scene.add(new THREE.AmbientLight(0xffffff,0.5))

let ground=new THREE.Mesh(
new THREE.PlaneGeometry(1500,1500),
new THREE.MeshLambertMaterial({color:0x2e8b57})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

let player=new THREE.Object3D()
let pitch=new THREE.Object3D()

pitch.add(camera)
player.add(pitch)

scene.add(player)

player.position.set(0,2,10)

let velocityY=0
let gravity=-0.01
let canJump=true

let running=false

let health=100
let score=0

function updateHealth(){
document.getElementById("health").style.width=health+"%"
}

function updateScore(){
document.getElementById("score").innerText="Score: "+score
}

let gun=new THREE.Mesh(
new THREE.BoxGeometry(0.3,0.2,1),
new THREE.MeshBasicMaterial({color:0x222222})
)

gun.position.set(0.5,-0.5,-1)
camera.add(gun)

let colliders=[]

function addCollider(mesh){
colliders.push(mesh)
}

function createHouse(x,z){

let house=new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshLambertMaterial({color:0x8B4513})
)

house.position.set(x,2.5,z)
scene.add(house)

addCollider(house)

let roof=new THREE.Mesh(
new THREE.ConeGeometry(6,4,4),
new THREE.MeshLambertMaterial({color:0xaa0000})
)

roof.position.set(x,6,z)
scene.add(roof)

}

function createTree(x,z){

let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,4),
new THREE.MeshLambertMaterial({color:0x8b5a2b})
)

trunk.position.set(x,2,z)
scene.add(trunk)
addCollider(trunk)

let leaves=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshLambertMaterial({color:0x228b22})
)

leaves.position.set(x,5,z)
scene.add(leaves)

}

function createRock(x,z){

let rock=new THREE.Mesh(
new THREE.DodecahedronGeometry(2),
new THREE.MeshLambertMaterial({color:0x777777})
)

rock.position.set(x,1,z)
scene.add(rock)

addCollider(rock)

}

for(let i=0;i<12;i++) createHouse(Math.random()*300-150,Math.random()*-300)
for(let i=0;i<40;i++) createTree(Math.random()*600-300,Math.random()*-600)
for(let i=0;i<25;i++) createRock(Math.random()*600-300,Math.random()*-600)

let enemies=[]
let enemyBullets=[]

function spawnEnemy(){

let enemy=new THREE.Mesh(
new THREE.CapsuleGeometry(0.8,2),
new THREE.MeshLambertMaterial({color:0xff0000})
)

enemy.position.set(Math.random()*120-60,1,Math.random()*-200)

enemy.cooldown=0

scene.add(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,4000)

let bullets=[]

document.addEventListener("click",()=>{

document.body.requestPointerLock()

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffff00})
)

let dir=new THREE.Vector3()
camera.getWorldDirection(dir)

let spawn=new THREE.Vector3(0.4,-0.4,-1)
spawn.applyMatrix4(camera.matrixWorld)

bullet.position.copy(spawn)
bullet.velocity=dir.clone()

scene.add(bullet)
bullets.push(bullet)

})

let keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.code==="ShiftLeft") running=true

if(e.code==="Space" && canJump){

velocityY=0.25
canJump=false

}

})

document.addEventListener("keyup",e=>{

keys[e.key]=false

if(e.code==="ShiftLeft") running=false

})

document.addEventListener("mousemove",(event)=>{

if(document.pointerLockElement===document.body){

player.rotation.y-=event.movementX*0.002
pitch.rotation.x-=event.movementY*0.002

pitch.rotation.x=Math.max(-1.5,Math.min(1.5,pitch.rotation.x))

}

})

function animate(){

requestAnimationFrame(animate)

let speed=running?0.45:0.2

if(keys["w"]) player.translateZ(-speed)
if(keys["s"]) player.translateZ(speed)
if(keys["a"]) player.translateX(-speed)
if(keys["d"]) player.translateX(speed)

velocityY+=gravity
player.position.y+=velocityY

if(player.position.y<=2){

player.position.y=2
velocityY=0
canJump=true

}

bullets.forEach((b,i)=>{

b.position.add(b.velocity.clone().multiplyScalar(1))

enemies.forEach((e,j)=>{

if(b.position.distanceTo(e.position)<1.5){

scene.remove(e)
enemies.splice(j,1)

scene.remove(b)
bullets.splice(i,1)

score++
updateScore()

}

})

})

enemies.forEach(e=>{

let dir=new THREE.Vector3().subVectors(player.position,e.position)

dir.y=0
dir.normalize()

e.position.add(dir.multiplyScalar(0.04))

e.cooldown--

if(e.cooldown<=0){

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xff0000})
)

let dir=new THREE.Vector3().subVectors(player.position,e.position).normalize()

bullet.position.copy(e.position)
bullet.velocity=dir

scene.add(bullet)
enemyBullets.push(bullet)

e.cooldown=120

}

})

enemyBullets.forEach((b,i)=>{

b.position.add(b.velocity.clone().multiplyScalar(0.6))

if(b.position.distanceTo(player.position)<1.5){

health-=10
updateHealth()

scene.remove(b)
enemyBullets.splice(i,1)

}

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
