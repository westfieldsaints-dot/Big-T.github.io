<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>
<style>
body { margin:0; overflow:hidden; }

/* MENU BUTTON */
#menuBtn {
  position:absolute;
  top:10px;
  left:10px;
  font-size:25px;
  color:white;
  cursor:pointer;
  z-index:10;
}

/* MENU PANEL */
#menu {
  position:absolute;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#111;
  color:white;
  padding:20px;
  transition:0.3s;
  font-family:Arial;
  z-index:9;
}

#menu a {
  color:lime;
  text-decoration:none;
  display:block;
  margin:10px 0;
}

/* STAMINA */
#staminaBar {
  position:absolute;
  bottom:20px;
  left:20px;
  width:200px;
  height:20px;
  background:#444;
}
#stamina {
  height:100%;
  width:100%;
  background:lime;
}

/* AMMO */
#ammo {
  position:absolute;
  bottom:20px;
  right:20px;
  color:white;
  font-size:20px;
  font-family:Arial;
}
</style>
</head>

<body>

<!-- MENU BUTTON -->
<div id="menuBtn">☰</div>

<!-- MENU -->
<div id="menu">
  <h2>Menu</h2>

  <b>Other Game:</b>
  <a href="index.html">Play Dodging Game</a>

  <br>

  <b>Controls:</b>
  <p>
  WASD = Move<br>
  SHIFT = Run<br>
  SPACE = Jump<br>
  Mouse = Look<br>
  Click = Shoot<br>
  R = Reload
  </p>
</div>

<div id="staminaBar"><div id="stamina"></div></div>
<div id="ammo">30 / 90</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// MENU TOGGLE
let menuOpen = false;
let menu = document.getElementById("menu");

document.getElementById("menuBtn").onclick = () => {
  menuOpen = !menuOpen;

  if(menuOpen){
    menu.style.left = "0px";
  } else {
    menu.style.left = "-250px";
  }
};

// SCENE
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.y = 2;

// RENDER
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
let controls = new THREE.PointerLockControls(camera, document.body);

document.body.addEventListener("click", () => {
  if(!menuOpen) controls.lock(); // don't lock if menu open
});

// LIGHT
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// GROUND
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x22aa22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// HOUSES
function house(x,z){
  let h = new THREE.Mesh(
    new THREE.BoxGeometry(5,3,5),
    new THREE.MeshStandardMaterial({color:0x8b4513})
  );
  h.position.set(x,1.5,z);

  let roof = new THREE.Mesh(
    new THREE.ConeGeometry(4,2,4),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  roof.position.set(x,4,z);
  roof.rotation.y = Math.PI/4;

  scene.add(h, roof);
}
house(10,-10);
house(-15,-20);
house(20,-30);

// GUN
let gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,0.3,1),
  new THREE.MeshStandardMaterial({color:0x333333})
);
gun.position.set(0.5,-0.5,-1);
camera.add(gun);
scene.add(camera);

// MOVEMENT
let move = {f:false,b:false,l:false,r:false,run:false};
let velocityY = 0;
let onGround = true;

// STAMINA
let stamina = 100;

// AMMO
let ammo = 30;
let reserveAmmo = 90;
let maxAmmo = 30;
let reloading = false;

// INPUT
document.addEventListener("keydown", e=>{
  if(e.key=="w") move.f=true;
  if(e.key=="s") move.b=true;
  if(e.key=="a") move.l=true;
  if(e.key=="d") move.r=true;
  if(e.key=="Shift") move.run=true;

  if(e.code==="Space" && onGround){
    velocityY = 0.15;
    onGround = false;
  }

  if(e.key=="r") reload();
});

document.addEventListener("keyup", e=>{
  if(e.key=="w") move.f=false;
  if(e.key=="s") move.b=false;
  if(e.key=="a") move.l=false;
  if(e.key=="d") move.r=false;
  if(e.key=="Shift") move.run=false;
});

// RELOAD
function reload(){
  if(reloading || ammo === maxAmmo || reserveAmmo <= 0) return;

  reloading = true;
  document.getElementById("ammo").innerText = "Reloading...";

  setTimeout(()=>{
    let needed = maxAmmo - ammo;
    let used = Math.min(needed, reserveAmmo);

    ammo += used;
    reserveAmmo -= used;

    reloading = false;
  }, 1500);
}

// SHOOT
let bullets = [];

document.addEventListener("click", shoot);

function shoot(){
  if(menuOpen) return; // can't shoot with menu open
  if(reloading || ammo <= 0) return;

  ammo--;

  let b = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );

  b.position.copy(camera.position);

  let dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  b.velocity = dir.multiplyScalar(1);

  scene.add(b);
  bullets.push(b);
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let running = move.run && stamina > 0;

  if(running) stamina -= 0.5;
  else stamina += 0.3;

  stamina = Math.max(0, Math.min(100, stamina));
  document.getElementById("stamina").style.width = stamina + "%";

  let speed = running ? 0.15 : 0.08;

  if(move.f) controls.moveForward(speed);
  if(move.b) controls.moveForward(-speed);
  if(move.l) controls.moveRight(-speed);
  if(move.r) controls.moveRight(speed);

  velocityY -= 0.01;
  camera.position.y += velocityY;

  if(camera.position.y <= 2){
    camera.position.y = 2;
    velocityY = 0;
    onGround = true;
  }

  bullets.forEach((b,i)=>{
    b.position.add(b.velocity);
    if(b.position.length() > 300){
      scene.remove(b);
      bullets.splice(i,1);
    }
  });

  if(!reloading){
    document.getElementById("ammo").innerText = ammo + " / " + reserveAmmo;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
