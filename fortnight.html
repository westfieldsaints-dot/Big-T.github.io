<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body{
margin:0;
overflow:hidden;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:20px;
height:20px;
margin-left:-10px;
margin-top:-10px;
border:2px solid white;
border-radius:50%;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>

</head>

<body>

<div id="crosshair"></div>
<div id="info">Click screen • WASD move • Click shoot</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene = new THREE.Scene()

scene.background = new THREE.Color(0x87CEEB)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let sun = new THREE.DirectionalLight(0xffffff,1.2)
sun.position.set(50,100,50)
scene.add(sun)

let ambient = new THREE.AmbientLight(0xffffff,0.5)
scene.add(ambient)

let groundGeo = new THREE.PlaneGeometry(500,500)
let groundMat = new THREE.MeshLambertMaterial({color:0x228B22})

let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x = -Math.PI/2
scene.add(ground)

let controls = new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>{
controls.lock()
})

scene.add(controls.getObject())

camera.position.y = 2

let moveForward=false
let moveBackward=false
let moveLeft=false
let moveRight=false

document.addEventListener("keydown",(e)=>{

if(e.key==="w") moveForward=true
if(e.key==="s") moveBackward=true
if(e.key==="a") moveLeft=true
if(e.key==="d") moveRight=true

})

document.addEventListener("keyup",(e)=>{

if(e.key==="w") moveForward=false
if(e.key==="s") moveBackward=false
if(e.key==="a") moveLeft=false
if(e.key==="d") moveRight=false

})

function createHouse(x,z){

let baseGeo = new THREE.BoxGeometry(6,4,6)
let baseMat = new THREE.MeshLambertMaterial({color:0x8B4513})

let base = new THREE.Mesh(baseGeo,baseMat)

base.position.set(x,2,z)

scene.add(base)

let roofGeo = new THREE.ConeGeometry(5,3,4)
let roofMat = new THREE.MeshLambertMaterial({color:0xAA0000})

let roof = new THREE.Mesh(roofGeo,roofMat)

roof.position.set(x,5,z)
roof.rotation.y = Math.PI/4

scene.add(roof)

}

for(let i=0;i<10;i++){

createHouse(
Math.random()*200-100,
Math.random()*-200
)

}

function createCloud(){

let geo = new THREE.SphereGeometry(3,16,16)
let mat = new THREE.MeshLambertMaterial({color:0xffffff})

let cloud = new THREE.Mesh(geo,mat)

cloud.position.set(
Math.random()*200-100,
30+Math.random()*10,
Math.random()*-200
)

scene.add(cloud)

}

for(let i=0;i<20;i++){
createCloud()
}

let enemies=[]

function spawnEnemy(){

let geo=new THREE.BoxGeometry(2,2,2)
let mat=new THREE.MeshLambertMaterial({color:0xff0000})

let enemy=new THREE.Mesh(geo,mat)

enemy.position.set(
Math.random()*80-40,
1,
Math.random()*-80
)

scene.add(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,4000)

let bullets=[]

document.addEventListener("mousedown",()=>{

let geo=new THREE.SphereGeometry(0.2)
let mat=new THREE.MeshBasicMaterial({color:0xffff00})

let bullet=new THREE.Mesh(geo,mat)

bullet.position.copy(camera.position)

bullet.velocity=new THREE.Vector3()
camera.getWorldDirection(bullet.velocity)

scene.add(bullet)

bullets.push(bullet)

})

function animate(){

requestAnimationFrame(animate)

let speed=0.15

if(moveForward) controls.moveForward(speed)
if(moveBackward) controls.moveForward(-speed)
if(moveLeft) controls.moveRight(-speed)
if(moveRight) controls.moveRight(speed)

bullets.forEach(b=>{

b.position.add(b.velocity.clone().multiplyScalar(0.6))

enemies.forEach((enemy,index)=>{

if(b.position.distanceTo(enemy.position)<1.5){

scene.remove(enemy)
enemies.splice(index,1)

}

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
