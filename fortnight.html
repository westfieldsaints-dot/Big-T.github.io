<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* MENU BUTTON */
#menuBtn {
  position:absolute;
  top:10px;
  left:10px;
  font-size:30px;
  color:white;
  cursor:pointer;
  z-index:10;
}

/* MENU PANEL */
#menu {
  position:absolute;
  top:0;
  left:0;
  width:250px;
  height:100%;
  background:rgba(0,0,0,0.9);
  color:white;
  padding:20px;
  display:none;
  z-index:10;
}

/* HUD */
#hud {
  position:absolute;
  bottom:10px;
  left:10px;
  color:white;
}

#crosshair {
  position:absolute;
  top:50%;
  left:50%;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  transform:translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="menu">
  <h2>MENU</h2>
  <p><b>Controls:</b></p>
  <p>WASD = Move</p>
  <p>SHIFT = Run</p>
  <p>SPACE = Jump</p>
  <p>Click = Shoot</p>
  <p>R = Reload</p>
  <br>
  <button onclick="window.location.href='index.html'">
    Go to Dodge Game
  </button>
</div>

<div id="hud">
  Ammo: <span id="ammo">10</span><br>
  Stamina: <span id="stamina">100</span>
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color("skyblue");

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* GROUND */
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshBasicMaterial({color:"green"})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* PLAYER */
let player = new THREE.Object3D();
scene.add(player);

camera.position.y = 2;
player.add(camera);

/* LIGHT */
let light = new THREE.DirectionalLight("white",1);
light.position.set(5,10,5);
scene.add(light);

/* CONTROLS */
let keys = {};
let velocityY = 0;
let onGround = true;
let stamina = 100;
let ammo = 10;
let paused = false;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/* POINTER LOCK */
document.body.onclick = () => {
  if(!paused) document.body.requestPointerLock();
};

document.addEventListener("mousemove", e => {
  if(document.pointerLockElement === document.body && !paused){
    player.rotation.y -= e.movementX * 0.002;
    camera.rotation.x -= e.movementY * 0.002;
    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
  }
});

/* SHOOT */
document.addEventListener("click", () => {
  if(ammo > 0 && !paused){
    ammo--;
    document.getElementById("ammo").innerText = ammo;
  }
});

/* RELOAD */
document.addEventListener("keydown", e => {
  if(e.key === "r"){
    ammo = 10;
    document.getElementById("ammo").innerText = ammo;
  }
});

/* MENU TOGGLE */
let menu = document.getElementById("menu");
document.getElementById("menuBtn").onclick = () => {
  paused = !paused;
  menu.style.display = paused ? "block" : "none";

  if(paused){
    document.exitPointerLock();
  }
};

/* GAME LOOP */
function animate(){
  requestAnimationFrame(animate);

  if(!paused){

    let speed = 0.1;

    if(keys["shift"] && stamina > 0){
      speed = 0.2;
      stamina -= 0.5;
    } else {
      stamina += 0.3;
    }

    stamina = Math.max(0, Math.min(100, stamina));
    document.getElementById("stamina").innerText = Math.floor(stamina);

    let forward = new THREE.Vector3();
    player.getWorldDirection(forward);
    forward.y = 0;

    let right = new THREE.Vector3();
    right.crossVectors(forward, new THREE.Vector3(0,1,0));

    if(keys["w"]) player.position.addScaledVector(forward, speed);
    if(keys["s"]) player.position.addScaledVector(forward, -speed);
    if(keys["a"]) player.position.addScaledVector(right, speed);
    if(keys["d"]) player.position.addScaledVector(right, -speed);

    /* JUMP */
    if(keys[" "] && onGround){
      velocityY = 0.2;
      onGround = false;
    }

    velocityY -= 0.01;
    player.position.y += velocityY;

    if(player.position.y < 0){
      player.position.y = 0;
      velocityY = 0;
      onGround = true;
    }
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
