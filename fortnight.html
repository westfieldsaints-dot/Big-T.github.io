<!DOCTYPE html>
<html>
<head>
  <title>Neon Drift 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
    }
  </style>
</head>
<body>

<div id="ui">
  Score: <span id="score">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 60);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
let light = new THREE.PointLight(0xffffff, 2, 100);
light.position.set(0, 10, 10);
scene.add(light);

// ROAD
let roadGeo = new THREE.PlaneGeometry(10, 200);
let roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
let road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
scene.add(road);

// PLAYER CAR
let carGeo = new THREE.BoxGeometry(1, 1, 2);
let carMat = new THREE.MeshStandardMaterial({ color: 0x00ffff });
let car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.5;
scene.add(car);

// OBSTACLES
let obstacles = [];

function spawnObstacle() {
  let geo = new THREE.BoxGeometry(1, 1, 2);
  let mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
  let obs = new THREE.Mesh(geo, mat);

  obs.position.set((Math.random() - 0.5) * 6, 0.5, -50);
  scene.add(obs);
  obstacles.push(obs);
}

setInterval(spawnObstacle, 1000);

// CONTROLS
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// GAME LOOP
let speed = 0.5;
let score = 0;

function animate() {
  requestAnimationFrame(animate);

  // movement
  if (keys["ArrowLeft"]) car.position.x -= 0.2;
  if (keys["ArrowRight"]) car.position.x += 0.2;

  // move obstacles
  obstacles.forEach(o => {
    o.position.z += speed;

    // collision
    if (
      Math.abs(o.position.x - car.position.x) < 1 &&
      Math.abs(o.position.z - car.position.z) < 1
    ) {
      alert("Game Over! Score: " + score);
      location.reload();
    }
  });

  // remove old obstacles
  obstacles = obstacles.filter(o => o.position.z < 10);

  score++;
  document.getElementById("score").textContent = score;

  renderer.render(scene, camera);
}

animate();

// resize fix
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
