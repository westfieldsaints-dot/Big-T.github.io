<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body{
margin:0;
overflow:hidden;
}

#info{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
}
</style>

</head>

<body>

<div id="info">
Click screen to start<br>
WASD = Move<br>
Mouse = Look<br>
Click = Shoot
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x222222)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

let floorGeo = new THREE.PlaneGeometry(200,200)
let floorMat = new THREE.MeshBasicMaterial({color:0x444444})
let floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

let controls = new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>{
controls.lock()
})

scene.add(controls.getObject())

camera.position.y = 2

let moveForward=false
let moveBackward=false
let moveLeft=false
let moveRight=false

document.addEventListener("keydown",(e)=>{

if(e.key==="w") moveForward=true
if(e.key==="s") moveBackward=true
if(e.key==="a") moveLeft=true
if(e.key==="d") moveRight=true

})

document.addEventListener("keyup",(e)=>{

if(e.key==="w") moveForward=false
if(e.key==="s") moveBackward=false
if(e.key==="a") moveLeft=false
if(e.key==="d") moveRight=false

})

let bots=[]

function spawnBot(){

let geo=new THREE.BoxGeometry(2,2,2)
let mat=new THREE.MeshBasicMaterial({color:0xff0000})

let bot=new THREE.Mesh(geo,mat)

bot.position.set(
Math.random()*50-25,
1,
Math.random()*50-25
)

scene.add(bot)
bots.push(bot)

}

setInterval(spawnBot,4000)

let bullets=[]

document.addEventListener("mousedown",()=>{

let geo=new THREE.SphereGeometry(0.2)
let mat=new THREE.MeshBasicMaterial({color:0xffff00})

let bullet=new THREE.Mesh(geo,mat)

bullet.position.copy(camera.position)

scene.add(bullet)

bullet.velocity=new THREE.Vector3()
camera.getWorldDirection(bullet.velocity)

bullets.push(bullet)

})

function animate(){

requestAnimationFrame(animate)

let speed=0.15

if(moveForward) controls.moveForward(speed)
if(moveBackward) controls.moveForward(-speed)
if(moveLeft) controls.moveRight(-speed)
if(moveRight) controls.moveRight(speed)

bullets.forEach(b=>{

b.position.add(b.velocity.clone().multiplyScalar(0.6))

bots.forEach(bot=>{

if(b.position.distanceTo(bot.position)<1){

scene.remove(bot)
scene.remove(b)

}

})

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
