<!DOCTYPE html>
<html>
<head>
<title>Fortnight Mode</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

#crosshair {
  position:absolute;
  top:50%; left:50%;
  width:8px; height:8px;
  background:white;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

#bars {
  position:absolute;
  bottom:20px;
  left:20px;
  width:200px;
}
.barContainer {
  height:18px;
  background:#333;
  margin-bottom:6px;
}
#healthBar { height:100%; width:100%; background:red; }
#staminaBar { height:100%; width:100%; background:lime; }

#ammo {
  position:absolute;
  bottom:20px;
  right:20px;
  color:white;
}

#hit {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:red;
  font-size:30px;
  display:none;
}
</style>
</head>

<body>

<div id="crosshair"></div>

<div id="bars">
  <div class="barContainer"><div id="healthBar"></div></div>
  <div class="barContainer"><div id="staminaBar"></div></div>
</div>

<div id="ammo"></div>
<div id="hit">✖</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// SCENE
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

// CAMERA
let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.05,2000);

// RENDER
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.5));
let sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(50,100,50);
scene.add(sun);

// FLOOR (FIXED)
let ground=new THREE.Mesh(
  new THREE.BoxGeometry(600,5,600),
  new THREE.MeshStandardMaterial({color:0x2e8b57})
);
ground.position.y=-2.5;
scene.add(ground);

// PLAYER
let player=new THREE.Object3D();
scene.add(player);
player.position.set(0,2,10);
player.add(camera);

// PISTOL (back)
let gun=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.2,1),
  new THREE.MeshStandardMaterial({color:0x333333})
);
gun.position.set(0.4,-0.3,-1);
camera.add(gun);

// INPUT
let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// POINTER LOCK
document.body.onclick=()=>document.body.requestPointerLock();

// LOOK
document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement===document.body){
    player.rotation.y-=e.movementX*0.002;
    camera.rotation.x-=e.movementY*0.002;
    camera.rotation.x=Math.max(-1.5,Math.min(1.5,camera.rotation.x));
  }
});

// STATS
let stamina=100, health=100, ammo=12;

// MOVE
function move(){
  let running=keys["shift"] && stamina>0;
  let speed=running?0.2:0.1;

  if(running) stamina-=0.5;
  else stamina=Math.min(100, stamina+0.3);

  let forward=new THREE.Vector3();
  player.getWorldDirection(forward);
  forward.y=0;

  let right=new THREE.Vector3();
  right.crossVectors(forward,new THREE.Vector3(0,1,0));

  if(keys["w"]) player.position.addScaledVector(forward,speed);
  if(keys["s"]) player.position.addScaledVector(forward,-speed);
  if(keys["a"]) player.position.addScaledVector(right,speed);
  if(keys["d"]) player.position.addScaledVector(right,-speed);
}

// SHOOT (PISTOL)
let bullets=[], enemyBullets=[], enemies=[];

document.addEventListener("click",()=>{
  if(ammo<=0) return;
  ammo--;

  let b=new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );

  b.position.copy(camera.getWorldPosition(new THREE.Vector3()));

  let dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  b.velocity=dir.multiplyScalar(1.5);

  scene.add(b);
  bullets.push(b);
});

// ENEMIES
function spawnEnemy(){
  let e=new THREE.Mesh(
    new THREE.CapsuleGeometry(0.5,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  e.position.set(Math.random()*100-50,2,Math.random()*-100);
  e.cooldown=0;
  scene.add(e);
  enemies.push(e);
}
for(let i=0;i<10;i++) spawnEnemy();

// 🌍 WORLD BACK
for(let i=0;i<25;i++){
  let t=new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,4),
    new THREE.MeshStandardMaterial({color:0x8b5a2b})
  );
  t.position.set(Math.random()*200-100,2,Math.random()*-200);

  let l=new THREE.Mesh(
    new THREE.SphereGeometry(2),
    new THREE.MeshStandardMaterial({color:0x228b22})
  );
  l.position.set(t.position.x,5,t.position.z);

  scene.add(t,l);
}

for(let i=0;i<20;i++){
  let b=new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  b.position.set(Math.random()*200-100,1.5,Math.random()*-200);
  scene.add(b);
}

for(let i=0;i<10;i++){
  let base=new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x8b5a2b})
  );
  base.position.set(Math.random()*200-100,2,Math.random()*-200);

  let roof=new THREE.Mesh(
    new THREE.ConeGeometry(5,3,4),
    new THREE.MeshStandardMaterial({color:0xaa0000})
  );
  roof.position.set(base.position.x,5,base.position.z);
  roof.rotation.y=Math.PI/4;

  scene.add(base,roof);
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  move();

  // bullets
  bullets.forEach((b,i)=>{
    b.position.add(b.velocity);

    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position)<1){
        scene.remove(e);
        enemies.splice(ei,1);

        hit.style.display="block";
        setTimeout(()=>hit.style.display="none",100);
      }
    });
  });

  // enemy AI
  enemies.forEach(e=>{
    let dir=player.position.clone().sub(e.position).normalize();
    e.position.add(dir.multiplyScalar(0.05));

    e.cooldown--;
    if(e.cooldown<=0){
      let b=new THREE.Mesh(
        new THREE.SphereGeometry(0.1),
        new THREE.MeshBasicMaterial({color:0xff0000})
      );
      b.position.copy(e.position);
      b.velocity=dir.multiplyScalar(0.7);
      scene.add(b);
      enemyBullets.push(b);
      e.cooldown=100;
    }
  });

  // enemy bullets hit player
  enemyBullets.forEach((b,i)=>{
    b.position.add(b.velocity);
    if(b.position.distanceTo(player.position)<1){
      health-=5;
      scene.remove(b);
    }
  });

  // UI
  healthBar.style.width=health+"%";
  staminaBar.style.width=stamina+"%";
  ammo.innerText="Ammo: "+ammo;

  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
